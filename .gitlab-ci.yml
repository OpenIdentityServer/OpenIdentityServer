stages:
  - build
  - test

variables:
  DOTNET_NOLOGO: "true"
  DOTNET_ROOT: "$CI_PROJECT_DIR/.dotnet"

# -----------------------
# Linux Build
# -----------------------
build-ubuntu:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - echo "Running on Ubuntu"
    - dotnet --info
    - chmod +x ./build.sh
    - ./build.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^features\/.*/'
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
    - if: '$CI_MERGE_REQUEST_ID'

